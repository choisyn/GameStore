<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>发布攻略 - 游戏社区商城</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --create-bg: #08111f;
            --create-card: rgba(12, 21, 36, 0.9);
            --create-line: rgba(148, 163, 184, 0.15);
            --create-primary: #38bdf8;
            --create-text: #e2e8f0;
            --create-muted: #93a5be;
        }

        body {
            margin: 0;
            min-height: 100vh;
            color: var(--create-text);
            background:
                radial-gradient(circle at top left, rgba(56, 189, 248, 0.15), transparent 30%),
                radial-gradient(circle at top right, rgba(245, 158, 11, 0.12), transparent 24%),
                linear-gradient(180deg, #07111f 0%, #101827 100%);
            font-family: "Noto Sans SC", "Microsoft YaHei", sans-serif;
        }

        .navbar {
            background: rgba(7, 17, 31, 0.92);
            backdrop-filter: blur(14px);
            border-bottom: 1px solid rgba(148, 163, 184, 0.12);
        }

        .navbar-brand,
        .nav-link {
            color: var(--create-text) !important;
        }

        .page-wrap {
            padding: 2.4rem 0 4rem;
        }

        .page-card {
            border: 1px solid var(--create-line);
            border-radius: 28px;
            background: var(--create-card);
            box-shadow: 0 24px 60px rgba(5, 12, 24, 0.35);
            overflow: hidden;
        }

        .page-header {
            padding: 1.8rem;
            border-bottom: 1px solid rgba(148, 163, 184, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .page-title {
            margin: 0;
            font-size: 2rem;
            font-weight: 800;
        }

        .page-desc {
            margin: 0.7rem 0 0;
            color: var(--create-muted);
            line-height: 1.8;
        }

        .form-wrap {
            padding: 1.8rem;
        }

        .form-label {
            font-weight: 700;
            margin-bottom: 0.55rem;
        }

        .form-control,
        .form-select {
            background: rgba(15, 23, 42, 0.76);
            color: var(--create-text);
            border: 1px solid rgba(148, 163, 184, 0.18);
            border-radius: 14px;
            min-height: 48px;
        }

        .form-control::placeholder {
            color: #8194ab;
        }

        .form-control:focus,
        .form-select:focus {
            background: rgba(15, 23, 42, 0.92);
            color: var(--create-text);
            border-color: rgba(56, 189, 248, 0.46);
            box-shadow: 0 0 0 0.2rem rgba(56, 189, 248, 0.12);
        }

        textarea.form-control {
            min-height: 180px;
            resize: vertical;
            line-height: 1.8;
        }

        .hint {
            color: var(--create-muted);
            font-size: 0.9rem;
            margin-top: 0.4rem;
        }

        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
            padding: 0.9rem 1rem;
            border-radius: 16px;
            background: rgba(15, 23, 42, 0.65);
            border: 1px solid rgba(148, 163, 184, 0.08);
        }

        .toolbar-tip {
            color: var(--create-muted);
            font-size: 0.92rem;
        }

        .btn-guide,
        .btn-guide-secondary {
            border: none;
            border-radius: 999px;
            padding: 0.78rem 1.2rem;
            font-weight: 700;
            text-decoration: none;
        }

        .btn-guide {
            background: linear-gradient(135deg, #38bdf8, #0ea5e9);
            color: #05121f;
        }

        .btn-guide-secondary {
            background: rgba(148, 163, 184, 0.12);
            color: var(--create-text);
        }

        .actions {
            display: flex;
            justify-content: flex-end;
            gap: 0.8rem;
            margin-top: 1.8rem;
            flex-wrap: wrap;
        }

        .preview {
            display: none;
            margin-top: 1.4rem;
            padding: 1.3rem;
            border-radius: 18px;
            background: rgba(15, 23, 42, 0.72);
            border: 1px solid rgba(148, 163, 184, 0.1);
        }

        .preview h3 {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 0.9rem;
        }

        .preview-body {
            line-height: 1.85;
            color: #dce6f1;
        }

        .notice {
            display: none;
            margin-bottom: 1rem;
        }

        @media (max-width: 768px) {
            .page-header,
            .form-wrap {
                padding: 1.2rem;
            }

            .actions .btn-guide,
            .actions .btn-guide-secondary {
                width: 100%;
                text-align: center;
            }
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark sticky-top">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/"><i class="bi bi-controller"></i> 游戏社区商城</a>
        <button class="navbar-toggler text-white border-0" type="button" data-bs-toggle="collapse" data-bs-target="#guideNavbar">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="guideNavbar">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" href="/">商店</a></li>
                <li class="nav-item"><a class="nav-link" href="/community">社区</a></li>
                <li class="nav-item"><a class="nav-link active" href="/guides">攻略</a></li>
                <li class="nav-item"><a class="nav-link" href="/library">游戏库</a></li>
            </ul>
            <div class="navbar-nav" id="navbarLinks">
                <a class="nav-link" href="/login" id="loginLink">登录</a>
                <a class="nav-link" href="/register" id="registerLink">注册</a>
            </div>
        </div>
    </div>
</nav>

<main class="container page-wrap">
    <section class="page-card">
        <div class="page-header">
            <div>
                <h1 class="page-title">发布攻略</h1>
                <p class="page-desc">把自己的通关路线、Boss 经验、加点思路或地图探索技巧整理成一篇可复用的攻略。</p>
            </div>
            <a class="btn-guide-secondary" href="/guides"><i class="bi bi-arrow-left"></i> 返回攻略列表</a>
        </div>

        <div class="form-wrap">
            <div class="alert alert-warning notice" id="loginNotice"></div>
            <div class="alert alert-danger notice" id="errorNotice"></div>

            <form id="guideForm">
                <div class="row g-4">
                    <div class="col-lg-8">
                        <label class="form-label" for="titleInput">标题</label>
                        <input class="form-control" id="titleInput" type="text" maxlength="200" placeholder="例如：《艾尔登法环》近战开荒与前期推图路线" required>
                        <div class="hint">建议清楚写明游戏名、阶段和主题，方便检索。</div>
                    </div>
                    <div class="col-lg-4">
                        <label class="form-label" for="gameSelect">关联游戏</label>
                        <select class="form-select" id="gameSelect" required>
                            <option value="">请选择游戏</option>
                        </select>
                    </div>

                    <div class="col-lg-4">
                        <label class="form-label" for="difficultySelect">难度</label>
                        <select class="form-select" id="difficultySelect">
                            <option value="BEGINNER">入门</option>
                            <option value="INTERMEDIATE">进阶</option>
                            <option value="ADVANCED">高阶</option>
                        </select>
                    </div>
                    <div class="col-lg-4">
                        <label class="form-label" for="minutesInput">预计阅读/完成分钟数</label>
                        <input class="form-control" id="minutesInput" type="number" min="1" max="600" value="15">
                    </div>
                    <div class="col-lg-4">
                        <label class="form-label" for="tagsInput">标签</label>
                        <input class="form-control" id="tagsInput" type="text" maxlength="255" placeholder="Boss,开荒,装备,配点">
                    </div>

                    <div class="col-12">
                        <label class="form-label" for="summaryInput">摘要</label>
                        <textarea class="form-control" id="summaryInput" rows="3" maxlength="500" placeholder="用 1-3 句话告诉玩家，这篇攻略解决什么问题。"></textarea>
                    </div>

                    <div class="col-12">
                        <label class="form-label" for="coverInput">封面图 URL</label>
                        <input class="form-control" id="coverInput" type="url" placeholder="可选，不填则默认使用游戏封面">
                    </div>

                    <div class="col-12">
                        <div class="toolbar">
                            <div class="toolbar-tip">正文建议使用分段写法，例如“准备阶段 / 推进路线 / Boss 技巧 / 注意事项”。</div>
                            <button class="btn-guide-secondary" id="previewBtn" type="button"><i class="bi bi-eye"></i> 预览正文</button>
                        </div>
                        <label class="form-label" for="contentInput">正文</label>
                        <textarea class="form-control" id="contentInput" rows="14" placeholder="请输入攻略正文，至少 20 个字符。" required></textarea>
                        <div class="hint">支持纯文本分段输入，详情页会自动按段落渲染。</div>
                    </div>
                </div>

                <div class="preview" id="previewBox">
                    <h3>正文预览</h3>
                    <div class="preview-body" id="previewBody"></div>
                </div>

                <div class="actions">
                    <a class="btn-guide-secondary" href="/guides">取消</a>
                    <button class="btn-guide" id="submitBtn" type="submit"><i class="bi bi-send"></i> 发布攻略</button>
                </div>
            </form>
        </div>
    </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    let currentUser = null;

    function escapeHtml(text) {
        return String(text ?? '')
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }

    function showNotice(id, message) {
        const element = document.getElementById(id);
        element.textContent = message;
        element.style.display = 'block';
    }

    function hideNotice(id) {
        document.getElementById(id).style.display = 'none';
    }

    function resetGuestNav() {
        document.getElementById('loginLink').style.display = '';
        document.getElementById('registerLink').style.display = '';
        document.getElementById('userInfo')?.remove();
    }

    function renderUserMenu(user) {
        document.getElementById('loginLink').style.display = 'none';
        document.getElementById('registerLink').style.display = 'none';

        if (document.getElementById('userInfo')) {
            return;
        }

        const navbarLinks = document.getElementById('navbarLinks');
        const userInfo = document.createElement('div');
        userInfo.id = 'userInfo';
        userInfo.className = 'dropdown';
        userInfo.innerHTML = `
            <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                <i class="bi bi-person-circle"></i> ${escapeHtml(user.username)}
            </a>
            <ul class="dropdown-menu dropdown-menu-end user-dropdown" style="background:#0f172a;border:1px solid rgba(148,163,184,0.16);">
                <li><a class="dropdown-item text-light" href="/profile">个人中心</a></li>
                <li><a class="dropdown-item text-light" href="/library">游戏库</a></li>
                <li><a class="dropdown-item text-light" href="#" onclick="logout(event)">退出登录</a></li>
            </ul>
        `;
        navbarLinks.appendChild(userInfo);
    }

    async function checkLoginStatus() {
        try {
            const response = await fetch('/api/auth/current');
            const result = await response.json();
            if (result.code === 200 && result.data) {
                currentUser = result.data;
                renderUserMenu(result.data);
                hideNotice('loginNotice');
                return true;
            }
        } catch (error) {
            console.error('检查登录状态失败:', error);
        }

        resetGuestNav();
        showNotice('loginNotice', '发布攻略需要先登录，2 秒后将跳转到登录页。');
        document.getElementById('submitBtn').disabled = true;
        setTimeout(() => {
            window.location.href = '/login';
        }, 2000);
        return false;
    }

    async function logout(event) {
        if (event) {
            event.preventDefault();
        }
        try {
            await fetch('/api/auth/logout', { method: 'POST' });
        } finally {
            window.location.href = '/';
        }
    }

    async function loadGames() {
        const select = document.getElementById('gameSelect');
        try {
            const response = await fetch('/api/games?page=0&size=300');
            const result = await response.json();
            if (result.code !== 200 || !Array.isArray(result.data)) {
                return;
            }
            select.innerHTML = '<option value="">请选择游戏</option>' + result.data.map(game => `
                <option value="${game.id}">${escapeHtml(game.displayName || game.name || `游戏 ${game.id}`)}</option>
            `).join('');
        } catch (error) {
            console.error('加载游戏列表失败:', error);
        }
    }

    function previewContent() {
        const content = document.getElementById('contentInput').value.trim();
        const previewBox = document.getElementById('previewBox');
        const previewBody = document.getElementById('previewBody');
        if (!content) {
            previewBox.style.display = 'none';
            return;
        }
        previewBody.innerHTML = escapeHtml(content)
            .split(/\n{2,}/)
            .map(paragraph => `<p>${paragraph.replace(/\n/g, '<br>')}</p>`)
            .join('');
        previewBox.style.display = 'block';
    }

    function collectPayload() {
        return {
            gameId: Number(document.getElementById('gameSelect').value),
            title: document.getElementById('titleInput').value.trim(),
            summary: document.getElementById('summaryInput').value.trim(),
            content: document.getElementById('contentInput').value.trim(),
            coverImageUrl: document.getElementById('coverInput').value.trim(),
            difficulty: document.getElementById('difficultySelect').value,
            estimatedMinutes: Number(document.getElementById('minutesInput').value),
            tags: document.getElementById('tagsInput').value.trim()
        };
    }

    async function submitGuide(event) {
        event.preventDefault();
        hideNotice('errorNotice');

        if (!currentUser) {
            showNotice('errorNotice', '请先登录后再发布攻略。');
            return;
        }

        const payload = collectPayload();
        const submitBtn = document.getElementById('submitBtn');
        submitBtn.disabled = true;
        submitBtn.textContent = '发布中...';

        try {
            const response = await fetch('/api/guides', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(payload)
            });
            const result = await response.json();
            if (result.code === 200 && result.data) {
                window.location.href = `/guides/${result.data.id}`;
                return;
            }
            showNotice('errorNotice', result.message || '发布失败，请检查输入内容。');
        } catch (error) {
            console.error('发布攻略失败:', error);
            showNotice('errorNotice', '发布失败，请稍后重试。');
        } finally {
            submitBtn.disabled = false;
            submitBtn.innerHTML = '<i class="bi bi-send"></i> 发布攻略';
        }
    }

    document.addEventListener('DOMContentLoaded', async () => {
        document.getElementById('previewBtn').addEventListener('click', previewContent);
        document.getElementById('guideForm').addEventListener('submit', submitGuide);
        await checkLoginStatus();
        await loadGames();
    });
</script>
</body>
</html>
