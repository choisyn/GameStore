<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - 游戏社区商城</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --steam-dark-bg: #1b2838;
            --steam-light-bg: #2a475e;
            --steam-card-bg: #1e2837;
            --steam-blue: #66c0f4;
            --steam-text: #c7d5e0;
        }

        body {
            background: linear-gradient(135deg, #1b2838 0%, #2a475e 100%);
            color: var(--steam-text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 0;
        }

        .register-container {
            background: var(--steam-card-bg);
            border-radius: 8px;
            padding: 3rem;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .register-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .register-header h2 {
            color: var(--steam-blue);
            margin-bottom: 0.5rem;
        }

        .form-control {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--steam-text);
            padding: 0.75rem;
            border-radius: 4px;
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--steam-blue);
            color: var(--steam-text);
            box-shadow: 0 0 0 0.2rem rgba(102, 192, 244, 0.25);
        }

        .form-label {
            color: #8f98a0;
            margin-bottom: 0.5rem;
        }

        .btn-register {
            background: var(--steam-blue);
            color: #1b2838;
            border: none;
            padding: 0.75rem;
            width: 100%;
            font-weight: bold;
            border-radius: 4px;
            transition: all 0.3s;
        }

        .btn-register:hover {
            background: #5ab0e6;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 192, 244, 0.4);
        }

        .link-login {
            color: var(--steam-blue);
            text-decoration: none;
        }

        .link-login:hover {
            color: #5ab0e6;
            text-decoration: underline;
        }

        .alert-custom {
            border-radius: 4px;
            padding: 0.75rem;
            margin-bottom: 1rem;
            display: none;
        }

        .alert-error {
            background: rgba(244, 67, 54, 0.1);
            border: 1px solid rgba(244, 67, 54, 0.3);
            color: #f44336;
        }

        .alert-success {
            background: rgba(76, 175, 80, 0.1);
            border: 1px solid rgba(76, 175, 80, 0.3);
            color: #4caf50;
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="register-header">
            <h2><i class="bi bi-person-plus"></i> 注册账号</h2>
            <p>加入我们，探索精彩游戏世界</p>
        </div>

        <div id="errorAlert" class="alert-custom alert-error"></div>
        <div id="successAlert" class="alert-custom alert-success"></div>

        <form id="registerForm">
            <div class="mb-3">
                <label for="username" class="form-label">用户名</label>
                <input type="text" class="form-control" id="username" required minlength="3" maxlength="20">
                <small class="text-muted">3-20个字符</small>
            </div>

            <div class="mb-3">
                <label for="email" class="form-label">邮箱</label>
                <input type="email" class="form-control" id="email" required>
            </div>

            <div class="mb-3">
                <label for="password" class="form-label">密码</label>
                <input type="password" class="form-control" id="password" required minlength="6">
                <small class="text-muted">至少6个字符</small>
            </div>

            <div class="mb-3">
                <label for="confirmPassword" class="form-label">确认密码</label>
                <input type="password" class="form-control" id="confirmPassword" required>
            </div>

            <button type="submit" class="btn btn-register mb-3">
                <i class="bi bi-check-circle"></i> 注册
            </button>

            <div class="text-center">
                <span class="text-muted">已有账号？</span>
                <a href="/login" class="link-login">立即登录</a>
            </div>
        </form>

        <div class="text-center mt-3">
            <a href="/" class="text-muted text-decoration-none">
                <i class="bi bi-arrow-left"></i> 返回首页
            </a>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const errorAlert = document.getElementById('errorAlert');
            const successAlert = document.getElementById('successAlert');

            // 隐藏之前的提示
            errorAlert.style.display = 'none';
            successAlert.style.display = 'none';

            // 验证密码是否一致
            if (password !== confirmPassword) {
                errorAlert.textContent = '两次输入的密码不一致';
                errorAlert.style.display = 'block';
                return;
            }

            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, email, password, confirmPassword })
                });

                const data = await response.json();

                if (data.code === 200) {
                    successAlert.textContent = '注册成功！3秒后跳转到登录页面...';
                    successAlert.style.display = 'block';
                    
                    setTimeout(() => {
                        window.location.href = '/login';
                    }, 3000);
                } else {
                    errorAlert.textContent = data.message || '注册失败';
                    errorAlert.style.display = 'block';
                }
            } catch (error) {
                errorAlert.textContent = '注册请求失败，请稍后重试';
                errorAlert.style.display = 'block';
            }
        });
    </script>
</body>
</html>
