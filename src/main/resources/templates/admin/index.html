<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>后台管理系统 - 游戏社区商城</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            --sidebar-width: 200px;
            --sidebar-peek: 15px;
            --sidebar-transition: 0.28s ease;
            --admin-bg: #101722;
            --admin-bg-soft: #162433;
            --admin-panel: rgba(23, 38, 53, 0.92);
            --admin-panel-strong: rgba(36, 59, 79, 0.96);
            --admin-border: rgba(102, 192, 244, 0.18);
            --admin-border-strong: rgba(102, 192, 244, 0.34);
            --admin-text: #c7d5e0;
            --admin-text-muted: #8f98a0;
            background:
                radial-gradient(circle at top right, rgba(102, 192, 244, 0.14), transparent 28%),
                radial-gradient(circle at bottom left, rgba(92, 184, 92, 0.10), transparent 24%),
                linear-gradient(180deg, var(--admin-bg) 0%, var(--admin-bg-soft) 48%, #1b2838 100%);
            color: var(--admin-text);
            font-family: "Microsoft YaHei", Arial, sans-serif;
            display: flex;
            min-height: 100vh;
            margin: 0;
        }

        .sidebar {
            width: var(--sidebar-width);
            background: linear-gradient(135deg, #1e3a5f 0%, #2a475e 100%);
            padding: 20px 0 82px;
            box-shadow: 2px 0 10px rgba(0, 0, 0, 0.3);
            position: fixed;
            left: 0;
            top: 0;
            bottom: 0;
            overflow-y: auto;
            transform: translateX(0);
            transition: transform var(--sidebar-transition), box-shadow var(--sidebar-transition);
            z-index: 1030;
        }

        body.sidebar-collapsed .sidebar {
            transform: translateX(calc(var(--sidebar-peek) - var(--sidebar-width)));
        }

        .sidebar::after {
            content: "";
            position: absolute;
            top: 0;
            right: 0;
            width: var(--sidebar-peek);
            height: 100%;
            background: linear-gradient(180deg, rgba(102, 192, 244, 0.35) 0%, rgba(102, 192, 244, 0.12) 100%);
            border-left: 1px solid rgba(255, 255, 255, 0.16);
            opacity: 0;
            pointer-events: none;
            transition: opacity var(--sidebar-transition);
        }

        body.sidebar-collapsed .sidebar::after {
            opacity: 1;
        }

        .sidebar-header {
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 20px;
        }

        .sidebar-header h4 {
            color: #66c0f4;
            margin: 0;
            font-weight: 600;
        }

        .sidebar-menu {
            list-style: none;
            padding: 0 10px;
            margin: 0;
        }

        .sidebar-menu li {
            margin-bottom: 5px;
        }

        .sidebar-menu a {
            display: flex;
            align-items: center;
            padding: 12px;
            color: var(--admin-text);
            text-decoration: none;
            border-radius: 5px;
            transition: all 0.3s ease;
        }

        .sidebar-menu a:hover,
        .sidebar-menu a.active {
            background: rgba(102, 192, 244, 0.2);
            color: #66c0f4;
        }

        .sidebar-menu a i {
            margin-right: 10px;
            font-size: 18px;
        }

        .main-content {
            margin-left: var(--sidebar-width);
            flex: 1;
            padding: 18px 24px 30px 10px;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.03) 0, rgba(255, 255, 255, 0) 220px);
            transition: margin-left var(--sidebar-transition);
        }

        body.sidebar-collapsed .main-content {
            margin-left: var(--sidebar-peek);
        }

        .sidebar-toggle {
            position: absolute;
            left: 16px;
            bottom: 18px;
            width: 44px;
            height: 44px;
            border: 1px solid rgba(102, 192, 244, 0.22);
            border-radius: 14px;
            background: linear-gradient(135deg, rgba(15, 25, 36, 0.78) 0%, rgba(28, 45, 62, 0.92) 100%);
            color: #dff4ff;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08), 0 10px 22px rgba(0, 0, 0, 0.22);
            cursor: pointer;
            transition: left var(--sidebar-transition), background-color var(--sidebar-transition), transform 0.2s ease, border-color var(--sidebar-transition);
            z-index: 2;
        }

        .sidebar-toggle:hover {
            background: linear-gradient(135deg, rgba(53, 87, 116, 0.96) 0%, rgba(26, 42, 58, 0.96) 100%);
            border-color: rgba(102, 192, 244, 0.4);
            transform: translateY(-1px);
        }

        body.sidebar-collapsed .sidebar-toggle {
            left: calc(var(--sidebar-width) - 26px);
        }

        .page-header,
        .stat-card,
        .card,
        .data-table,
        .tab-content > .tab-pane {
            border: 1px solid var(--admin-border);
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.22);
        }

        .page-header,
        .stat-card {
            position: relative;
            overflow: hidden;
        }

        .page-header::after,
        .stat-card::after,
        .data-table::before {
            content: "";
            position: absolute;
            inset: 0 auto auto 0;
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, rgba(255, 255, 255, 0.42), rgba(255, 255, 255, 0));
            pointer-events: none;
        }

        .page-header {
            background: linear-gradient(135deg, rgba(46, 83, 111, 0.94) 0%, rgba(23, 38, 53, 0.98) 100%);
            padding: 25px;
            border-radius: 18px;
            margin-bottom: 30px;
        }

        .page-header h2 {
            margin: 0;
            color: #66c0f4;
            font-size: 28px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(160deg, rgba(42, 71, 94, 0.96) 0%, rgba(23, 38, 53, 0.96) 100%);
            padding: 25px;
            border-radius: 18px;
        }

        .stat-card h3 {
            font-size: 14px;
            color: var(--admin-text-muted);
            margin-bottom: 10px;
        }

        .stat-card .value {
            font-size: 36px;
            font-weight: 600;
            color: #66c0f4;
            margin-bottom: 10px;
        }

        .stat-card .icon {
            font-size: 48px;
            color: rgba(102, 192, 244, 0.3);
            float: right;
        }

        .card {
            background: linear-gradient(180deg, rgba(36, 59, 79, 0.95) 0%, rgba(23, 38, 53, 0.96) 100%) !important;
            border-radius: 18px;
        }

        .card-body {
            color: var(--admin-text);
        }

        .data-table {
            position: relative;
            background: linear-gradient(180deg, rgba(35, 57, 76, 0.97) 0%, rgba(18, 29, 41, 0.98) 100%);
            border-radius: 18px;
            overflow: hidden;
        }

        .table {
            --bs-table-color: var(--admin-text);
            --bs-table-bg: transparent;
            --bs-table-striped-bg: rgba(255, 255, 255, 0.02);
            --bs-table-striped-color: var(--admin-text);
            --bs-table-hover-bg: rgba(102, 192, 244, 0.10);
            --bs-table-hover-color: #f4fbff;
            --bs-table-border-color: rgba(255, 255, 255, 0.08);
            color: var(--admin-text);
            margin: 0;
        }

        .table > :not(caption) > * > * {
            background: transparent;
            box-shadow: none;
            border-bottom-color: rgba(255, 255, 255, 0.08);
            padding: 1rem 1.05rem;
            vertical-align: middle;
        }

        .table thead th {
            background: linear-gradient(180deg, rgba(102, 192, 244, 0.18) 0%, rgba(102, 192, 244, 0.08) 100%);
            color: #eff8ff;
            font-weight: 600;
            border-bottom: 1px solid var(--admin-border-strong);
        }

        .table tbody tr {
            transition: transform 0.2s ease, background-color 0.2s ease;
        }

        .table tbody tr:hover {
            transform: translateX(4px);
        }

        .table tbody tr:last-child td {
            border-bottom: none;
        }

        .table a {
            color: #9bd9ff;
            text-decoration: none;
        }

        .table a:hover {
            color: #dff4ff;
        }

        .nav-tabs {
            border-bottom: 1px solid var(--admin-border);
            gap: 10px;
        }

        .nav-tabs .nav-link {
            color: var(--admin-text);
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid transparent;
            border-radius: 999px;
            padding: 0.65rem 1.05rem;
            transition: all 0.2s ease;
        }

        .nav-tabs .nav-link:hover {
            color: #eff8ff;
            background: rgba(102, 192, 244, 0.10);
            border-color: var(--admin-border);
        }

        .nav-tabs .nav-link.active {
            color: #0f1a24;
            background: linear-gradient(135deg, #66c0f4 0%, #a6deff 100%);
            border-color: transparent;
            box-shadow: 0 10px 24px rgba(102, 192, 244, 0.28);
        }

        .tab-content > .tab-pane {
            background: rgba(18, 29, 41, 0.28);
            border-radius: 18px;
            padding: 1rem 0 0;
        }

        .pagination {
            gap: 8px;
        }

        .page-link {
            background: rgba(21, 35, 50, 0.92);
            border-color: var(--admin-border);
            color: var(--admin-text);
            border-radius: 10px !important;
        }

        .page-link:hover {
            background: rgba(102, 192, 244, 0.14);
            border-color: var(--admin-border-strong);
            color: #ffffff;
        }

        .page-item.active .page-link {
            background: linear-gradient(135deg, #66c0f4 0%, #4a90e2 100%);
            border-color: transparent;
            color: #0f1a24;
            box-shadow: 0 10px 22px rgba(102, 192, 244, 0.26);
        }

        .page-item.disabled .page-link {
            background: rgba(15, 24, 34, 0.82);
            border-color: rgba(255, 255, 255, 0.04);
            color: rgba(199, 213, 224, 0.38);
        }

        .btn-primary {
            background: linear-gradient(135deg, #66c0f4 0%, #4a90e2 100%);
            border: none;
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, #4a90e2 0%, #66c0f4 100%);
        }

        .btn-danger {
            background: linear-gradient(135deg, #d32f2f 0%, #b71c1c 100%);
            border: none;
        }

        .btn-warning {
            background: linear-gradient(135deg, #ffa726 0%, #ff9800 100%);
            border: none;
        }

        .btn-success {
            background: linear-gradient(135deg, #66bb6a 0%, #4caf50 100%);
            border: none;
        }

        .btn-outline-primary,
        .btn-outline-info,
        .btn-outline-secondary,
        .btn-outline-success,
        .btn-outline-warning,
        .btn-outline-danger {
            background: transparent;
        }

        .text-muted {
            color: rgba(199, 213, 224, 0.68) !important;
        }

        .badge {
            padding: 5px 10px;
        }

        .modal-content {
            background: #2a475e;
            color: var(--admin-text);
            border: 1px solid var(--admin-border);
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
        }

        .modal-header {
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .modal-footer {
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .form-control,
        .form-select,
        .input-group-text {
            background: #1b2838;
            border: 1px solid #3c5a72;
            color: var(--admin-text);
        }

        .form-control:focus,
        .form-select:focus {
            background: #1b2838;
            border-color: #66c0f4;
            color: var(--admin-text);
            box-shadow: 0 0 0 0.2rem rgba(102, 192, 244, 0.25);
        }

        .form-control::placeholder {
            color: rgba(199, 213, 224, 0.55);
        }

        .btn-close {
            filter: invert(1) grayscale(100%) brightness(200%);
            opacity: 0.7;
        }

        .btn-close:hover {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">
            <h4><i class="bi bi-shield-lock"></i> 管理系统</h4>
            <small id="adminUsername">管理员</small>
        </div>
        <ul class="sidebar-menu">
            <li><a href="#dashboard" class="menu-link active" data-page="dashboard"><i class="bi bi-speedometer2"></i> 仪表盘</a></li>
            <li><a href="#games" class="menu-link" data-page="games"><i class="bi bi-controller"></i> 游戏管理</a></li>
            <li><a href="#community" class="menu-link" data-page="community"><i class="bi bi-chat-square-dots"></i> 社区管理</a></li>
            <li><a href="#users" class="menu-link" data-page="users"><i class="bi bi-people"></i> 用户管理</a></li>
            <li><a href="#categories" class="menu-link" data-page="categories"><i class="bi bi-tags"></i> 分类管理</a></li>
            <li><a href="#banners" class="menu-link" data-page="banners"><i class="bi bi-images"></i> 轮播图管理</a></li>
            <li><a href="/" class="menu-link"><i class="bi bi-house-door"></i> 返回首页</a></li>
            <li><a href="#" class="menu-link" onclick="logout(event)"><i class="bi bi-box-arrow-right"></i> 退出登录</a></li>
        </ul>
        <button type="button" class="sidebar-toggle" id="sidebarToggle" onclick="toggleSidebar()" aria-label="切换侧边栏">
            <i class="bi bi-chevron-bar-left"></i>
        </button>
    </div>

    <div class="main-content">
        <div id="content-area"></div>
    </div>

    <script src="/js/ui-feedback.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            initSidebar();
            checkAuth();
            loadPage('dashboard');

            document.querySelectorAll('.menu-link').forEach(link => {
                link.addEventListener('click', function(event) {
                    const page = this.getAttribute('data-page');
                    if (!page) {
                        return;
                    }

                    event.preventDefault();
                    loadPage(page);

                    document.querySelectorAll('.menu-link').forEach(item => item.classList.remove('active'));
                    this.classList.add('active');
                });
            });
        });

        function initSidebar() {
            const stored = localStorage.getItem('adminSidebarCollapsed');
            const collapsed = stored === null ? false : stored === 'true';
            document.body.classList.toggle('sidebar-collapsed', collapsed);
            updateSidebarToggle(collapsed);
        }

        function toggleSidebar() {
            const collapsed = !document.body.classList.contains('sidebar-collapsed');
            document.body.classList.toggle('sidebar-collapsed', collapsed);
            localStorage.setItem('adminSidebarCollapsed', String(collapsed));
            updateSidebarToggle(collapsed);
        }

        function updateSidebarToggle(collapsed) {
            const toggleButton = document.getElementById('sidebarToggle');
            if (!toggleButton) {
                return;
            }

            const icon = toggleButton.querySelector('i');
            toggleButton.title = collapsed ? '展开侧边栏' : '收起侧边栏';
            toggleButton.setAttribute('aria-expanded', String(!collapsed));
            icon.className = collapsed ? 'bi bi-chevron-bar-right' : 'bi bi-chevron-bar-left';
        }

        async function checkAuth() {
            try {
                const response = await fetch('/api/auth/current');
                const data = await response.json();

                if (data.code !== 200 || data.data.role !== 'ADMIN') {
                    await appAlert('您没有权限访问后台管理系统！', { title: '权限不足', type: 'warning' });
                    window.location.href = '/login';
                    return;
                }

                document.getElementById('adminUsername').textContent = data.data.username;
            } catch (error) {
                console.error('检查权限失败:', error);
                window.location.href = '/login';
            }
        }

        function loadPage(page) {
            switch (page) {
                case 'dashboard':
                    loadDashboard();
                    break;
                case 'games':
                    loadGamesPage();
                    break;
                case 'community':
                    loadCommunityPage();
                    break;
                case 'users':
                    loadUsersPage();
                    break;
                case 'categories':
                    loadCategoriesPage();
                    break;
                case 'banners':
                    loadBannersPage();
                    break;
                default:
                    loadDashboard();
                    break;
            }
        }

        async function logout(event) {
            event.preventDefault();
            if (await appConfirm('确定要退出登录吗？', { title: '退出登录', type: 'warning' })) {
                try {
                    await fetch('/api/auth/logout', { method: 'POST' });
                    window.location.href = '/';
                } catch (error) {
                    console.error('退出登录失败:', error);
                }
            }
        }
    </script>

    <script th:src="@{/js/admin/dashboard.js}"></script>
    <script th:src="@{/js/admin/games.js}"></script>
    <script th:src="@{/js/admin/community.js}"></script>
    <script th:src="@{/js/admin/users.js}"></script>
    <script th:src="@{/js/admin/banners.js}"></script>
    <script th:src="@{/js/admin/categories.js}"></script>
</body>
</html>
