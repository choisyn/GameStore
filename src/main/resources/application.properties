# 应用基础配置
spring.application.name=game-community-store
server.port=${SERVER_PORT:8080}
server.servlet.context-path=/

# 数据源配置
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3307/bishe?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:gamestore}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 连接池配置
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# JPA配置
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Shanghai

# Redis配置
spring.redis.host=${SPRING_REDIS_HOST:localhost}
spring.redis.port=${SPRING_REDIS_PORT:6379}
spring.redis.password=${SPRING_REDIS_PASSWORD:}
spring.redis.database=${SPRING_REDIS_DATABASE:0}
spring.redis.timeout=${SPRING_REDIS_TIMEOUT:2000ms}
spring.redis.lettuce.pool.max-active=8
spring.redis.lettuce.pool.max-idle=8
spring.redis.lettuce.pool.min-idle=0

# JWT配置
jwt.secret=${JWT_SECRET:gamestore-secret-key-2024}
jwt.expiration=${JWT_EXPIRATION:86400000}

# 文件上传配置
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
file.upload.path=${FILE_UPLOAD_PATH:uploads/}

# 日志配置
logging.level.com.gamestore=${APP_LOG_LEVEL:DEBUG}
logging.level.org.springframework.security=${SPRING_SECURITY_LOG_LEVEL:DEBUG}
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Thymeleaf配置
spring.thymeleaf.cache=${SPRING_THYMELEAF_CACHE:false}
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.mode=HTML
